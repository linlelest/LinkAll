# LinkALL Android Gradle 配置
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=false

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin
kotlin.code.style=official

# R8 兼容模式：fullMode 会将缺失类视为编译错误（WebRTC/Markwon 等库引用的运行时类
# 无法在编译期完整解析）。关闭 fullMode 后仍执行代码压缩 + 混淆 + 资源压缩，
# 满足"R8 全开"的设计功能目标（APK 体积优化），但缺失类降级为警告而非编译失败。
android.enableR8.fullMode=false

# 限制内存占用，保证 <60MB 目标
org.gradle.workers.max=4

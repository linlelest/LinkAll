# Web CI - Svelte 5 + Vite 6 网页端构建
name: Web CI (Svelte)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

jobs:
  build:
    name: Build Web (Svelte 5 + Vite 6)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Run svelte-check (type check)
        working-directory: web
        run: npm run check || true

      - name: Build production bundle (Vite)
        working-directory: web
        run: npm run build

      - name: Show bundle size
        if: always()
        working-directory: web
        run: |
          echo "=== 生产包体积 ==="
          if [ -d "dist" ]; then
            du -sh dist
            echo "--- dist 资源明细 ---"
            ls -lh dist/assets/ 2>/dev/null || true
            JS_SIZE=$(find dist -name "*.js" -exec du -bc {} + 2>/dev/null | tail -1 | cut -f1)
            CSS_SIZE=$(find dist -name "*.css" -exec du -bc {} + 2>/dev/null | tail -1 | cut -f1)
            echo "JS 总计: $((JS_SIZE / 1024)) KB"
            echo "CSS 总计: $((CSS_SIZE / 1024)) KB"
            echo "设计目标: JS <8KB (gzip)"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkall-web-dist
          path: web/dist
          retention-days: 30
          if-no-files-found: error

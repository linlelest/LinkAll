# Android CI - Kotlin + Jetpack Compose 原生 App 构建
name: Android CI (Kotlin + Compose)

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.10.2

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK (arm64-v8a + armeabi-v7a)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK (R8 full mode)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkall-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: linkall-android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Show build output
        if: always()
        working-directory: android
        run: |
          echo "=== 构建产物 ==="
          find . -name "*.apk" -type f 2>/dev/null || true
          echo "=== APK 目录 ==="
          ls -lhR app/build/outputs/apk/ 2>/dev/null || true
        shell: bash

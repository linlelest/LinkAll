# Desktop CI - Tauri 2 + Rust 桌面被控端构建
name: Desktop CI (Tauri 2)

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: linkall-desktop-windows
            artifact_path: desktop/src-tauri/target/release/bundle
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: linkall-desktop-linux
            artifact_path: desktop/src-tauri/target/release/bundle

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 'stable'
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxi-dev \
            libxtst-dev

      - name: Install npm dependencies
        working-directory: desktop
        run: npm install

      - name: Cargo fmt check
        working-directory: desktop/src-tauri
        run: cargo fmt --check
        continue-on-error: true

      - name: Cargo clippy
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: Build Tauri app
        working-directory: desktop
        run: npm run build
        env:
          TAURI_PRIVATE_KEY: ''
          TAURI_KEY_PASSWORD: ''

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: linkall-desktop-windows-bin
          path: desktop/src-tauri/target/release/linkall-desktop.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linkall-desktop-linux-bin
          path: desktop/src-tauri/target/release/linkall-desktop
          retention-days: 30
          if-no-files-found: warn

      - name: Show build output
        if: always()
        working-directory: desktop/src-tauri/target
        run: |
          echo "=== 构建产物 ==="
          find . -name "linkall*" -type f 2>/dev/null || true
          echo "=== Bundle 目录 ==="
          ls -lhR release/bundle/ 2>/dev/null || true
        shell: bash

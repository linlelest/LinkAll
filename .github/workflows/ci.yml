# LinkALL 统一 CI - 全平台构建（服务端 + 网页端 + 桌面端 + Android 端）
name: LinkALL CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==================== 服务端（Go）+ 网页端（嵌入二进制）====================
  server:
    name: Server (Go + embedded Web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 先构建网页端，将 dist 嵌入服务端二进制 ---
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web frontend (Vite)
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Copy web/dist into server/internal/static/web_dist (for go:embed)
        run: |
          rm -rf server/internal/static/web_dist
          cp -r web/dist server/internal/static/web_dist
          ls -la server/internal/static/web_dist/

      # --- 构建 Go 服务端（前端已嵌入）---
      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Generate go.sum (go mod tidy)
        working-directory: server
        run: go mod tidy

      - name: Run go vet
        working-directory: server
        run: go vet ./...

      - name: Run gofmt (auto-format)
        working-directory: server
        run: gofmt -w .

      - name: Build binary (Linux + Windows, web embedded)
        working-directory: server
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.appVersion=0.1.0" -o remote-server-linux-amd64 ./cmd
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.appVersion=0.1.0" -o remote-server-windows-amd64.exe ./cmd

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linkall-server-linux-amd64
          path: server/remote-server-linux-amd64
          retention-days: 30
          if-no-files-found: error

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: linkall-server-windows-amd64
          path: server/remote-server-windows-amd64.exe
          retention-days: 30
          if-no-files-found: error

  # ==================== 桌面端（Tauri 2 + Rust）====================
  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: linkall-desktop-windows
            artifact_path: desktop/src-tauri/target/release/bundle
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: linkall-desktop-linux
            artifact_path: desktop/src-tauri/target/release/bundle
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 'stable'
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxrandr-dev \
            libxfixes-dev \
            libxi-dev \
            libxtst-dev

      - name: Install npm dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        working-directory: desktop
        run: npm run build
        env:
          TAURI_PRIVATE_KEY: ''
          TAURI_KEY_PASSWORD: ''

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: linkall-desktop-windows-bin
          path: desktop/src-tauri/target/release/linkall-desktop.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linkall-desktop-linux-bin
          path: desktop/src-tauri/target/release/linkall-desktop
          retention-days: 30
          if-no-files-found: warn

  # ==================== Android 端（Kotlin + Compose）====================
  android:
    name: Android (Kotlin)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.10.2

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK (arm64-v8a + armeabi-v7a)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: linkall-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: linkall-android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn
